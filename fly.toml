app = "onyx-paper-trader"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  # SQLite lives on the mounted volume so it survives restarts/deploys.
  DATABASE_URL = "file:/data/prod.db"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
